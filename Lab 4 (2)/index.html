<html>

<head>
    <script src="script.js"></script>
</head>

<body>
    <fieldset>
        <legend>Log in</legend>
        <form onsubmit="return validation()">


            <table>
                <tr>
                    <td>
                        Username
                    </td>
                    <td>
                        <input type="text" id="uName">
                    </td>
                    <td>
                        <p id="uNameError" style="color: red ; font-size: 14px;"></p>
                    </td>
                </tr>
                <tr>
                    <td>
                        password
                    </td>
                    <td>
                        <input type="password" id="pass">
                    </td>
                    <td>
                        <p id="passError" style="color: red ; font-size: 14px;"></p>
                    </td>
                </tr>
                <tr>
                    <td><button id="loginbtn">Log In </button></td>
                </tr>
            </table>
        </form>
        <p>Total Registration count <span id="count">0</span></p>

    </fieldset>

</body>

</html>
