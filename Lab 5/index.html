<html>

<head>
    <script src="script.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <fieldset>
        <legend> Student Registration Form</legend>
        <form onsubmit="return validation()">
            <table>
                <tr>
                    <td> <label> First Name</label></td>
                    <td> <input type="text" id="fname"></td>
                    <td>
                        <p id="fnameError"></p>
                    </td>
                </tr>
                <tr>
                    <td> <label> Last Name</label></td>
                    <td> <input type="text" id="lname"></td>
                    <td>
                        <p id="lnameError"></p>
                    </td>
                </tr>
                <tr>
                    <td> <label> Student ID</label></td>
                    <td> <input type="text" id="stdId"></td>
                    <td>
                        <p id="stdIdError"></p>
                    </td>
                </tr>
                <tr>
                    <td> <label>Email</label></td>
                    <td> <input type="email" id="email"></td>
                    <td>
                        <p id="emailError"></p>
                    </td>
                </tr>
                <tr>
                    <td> <label>Credit Complete</label></td>
                    <td> <input type="number" id="credit"></td>
                    <td>
                        <p id="creditError"></p>
                    </td>
                </tr>
                <tr>
                    <td> <label>Department</label></td>
                    <td> <select name="Department" id="dept">
                            <option disabled selected>Select -- Option</option>
                            <option value="CSE">CSE</option>
                            <option value="EEE">EEE</option>
                            <option value="BBA">BBA</option>
                            <option value="IPE">IPE</option>
                            <option value="ENGLISH">ENGLISH</option>
                        </select></td>
                    <td>
                        <p id="deptError">* Required</p>
                    </td>
                </tr>
            </table>
            <button> Submit </button>
            <div id="stdInfo">
                <h5>First Name ----- Last Name ----- ID ----- Email ----- Credits ----- Department</p>
            </div>
        </form>
    </fieldset>

</body>

</html>
