<html>

<head>
    <link rel="stylesheet" href="./Style/task2.css">
</head>

<body>

    <form>
        <fieldset>
            <legend> Student Information</legend>
            <table>
                <tr>
                    <td>
                        <label for="fName">Full Name (Text)</label> <br>
                        <input type="text" name="fName" id="fName" placeholder="Enter your full name">
                    </td>

                    <td><label for="email">Email Address</label> <br>
                        <input type="text" name="email" id="email" placeholder="your.email@example.com">
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="pass">Password</label> <br>
                        <input type="password" name="pass" id="pass" placeholder="Enter secure Password">
                    </td>

                    <td><label for="age">Age (Number) </label><br>
                        <input type="number" name="age" id="age" placeholder="Enter your age">
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="expDate">Experimen Date</label> <br>
                        <input type="date" name="expDate" id="expDate" placeholder="mm/dd/yyyy">
                    </td>

                    <td><label for="email">Phone Number (Tel) </label> <br>
                        <input type="tel" name="tel" id="tel" placeholder="+880 XXXX XXXXX">
                    </td>
                </tr>
                <td align="right">
                    <button class="btnSubmit">SUBMIT</button>
                </td>
                <td align="left">
                    <button class="btnClear">CLEAR</button>
                </td>
                <tr>
                </tr>
            </table>
        </fieldset>
    </form>


</body>

</html>
